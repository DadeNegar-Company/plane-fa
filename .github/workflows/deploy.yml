name: Build & Deploy to Production

on:
  push:
    branches:
      - develop

concurrency:
  group: deploy-production
  cancel-in-progress: false # don't cancel mid-deploy

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # Build all Docker images in parallel and push to GHCR
  # ---------------------------------------------------------------------------
  build-web:
    name: Build Web (plane-frontend)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile.web
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/plane-frontend:latest
            ${{ env.IMAGE_PREFIX }}/plane-frontend:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  build-admin:
    name: Build Admin (plane-admin)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/admin/Dockerfile.admin
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/plane-admin:latest
            ${{ env.IMAGE_PREFIX }}/plane-admin:${{ github.sha }}
          cache-from: type=gha,scope=admin
          cache-to: type=gha,mode=max,scope=admin

  build-space:
    name: Build Space (plane-space)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/space/Dockerfile.space
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/plane-space:latest
            ${{ env.IMAGE_PREFIX }}/plane-space:${{ github.sha }}
          cache-from: type=gha,scope=space
          cache-to: type=gha,mode=max,scope=space

  build-live:
    name: Build Live (plane-live)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/live/Dockerfile.live
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/plane-live:latest
            ${{ env.IMAGE_PREFIX }}/plane-live:${{ github.sha }}
          cache-from: type=gha,scope=live
          cache-to: type=gha,mode=max,scope=live

  build-api:
    name: Build API (plane-backend)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile.api
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/plane-backend:latest
            ${{ env.IMAGE_PREFIX }}/plane-backend:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  build-proxy:
    name: Build Proxy (plane-proxy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./apps/proxy
          file: ./apps/proxy/Dockerfile.ce
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/plane-proxy:latest
            ${{ env.IMAGE_PREFIX }}/plane-proxy:${{ github.sha }}
          cache-from: type=gha,scope=proxy
          cache-to: type=gha,mode=max,scope=proxy

  # ---------------------------------------------------------------------------
  # Deploy to production server via SSH
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Server
    runs-on: [self-hosted, deploy]
    needs:
      - build-web
      - build-admin
      - build-space
      - build-live
      - build-api
      - build-proxy
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: |
          set -e
          echo "=== Deploy started at $(date) ==="

          # Login to GHCR
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin

          # Sync compose file from the checked-out workspace (no git needed on server)
          cp "$GITHUB_WORKSPACE/deploy/docker-compose.yml" ~/apps/plane-fa/deploy/docker-compose.yml

          cd ~/apps/plane-fa/deploy

          # Pull latest images
          docker compose pull

          # Run database migrations
          docker compose up -d api
          docker compose exec -T api python manage.py migrate --noinput

          # Rolling restart (db/redis/mq stay untouched)
          docker compose up -d --remove-orphans

          # Cleanup dangling images
          docker image prune -f

          echo "=== Deploy finished at $(date) ==="
          docker compose ps

          # Health check — wait up to 60s for API (using python since curl is not in the image)
          echo "=== Running health check ==="
          for i in $(seq 1 12); do
            if docker compose exec -T api python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/')" > /dev/null 2>&1; then
              echo "=== Health check passed ==="
              exit 0
            fi
            sleep 5
          done
          echo "::error::API health check timed out after 60s"
          exit 1
